name: Daily Meme Update

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  update-meme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch random meme from Reddit
        id: meme
        run: |
          RESPONSE=$(curl -s https://meme-api.com/gimme)
          MEME_URL=$(echo "$RESPONSE" | jq -r '.url')
          MEME_TITLE=$(echo "$RESPONSE" | jq -r '.title')
          echo "meme_url=$MEME_URL" >> $GITHUB_OUTPUT
          echo "meme_title=$MEME_TITLE" >> $GITHUB_OUTPUT

      - name: Update README with new meme and quote
        shell: python
        env:
          MEME_URL: ${{ steps.meme.outputs.meme_url }}
          MEME_TITLE: ${{ steps.meme.outputs.meme_title }}
        run: |
          import os

          meme_url = os.environ["MEME_URL"]
          meme_title = os.environ["MEME_TITLE"]

          with open("README.md", "r", encoding="utf-8") as f:
            content = f.read()

          # --- Update meme ---
          meme_start = "<!-- MEME_START -->"
          meme_end = "<!-- MEME_END -->"

          start_idx = content.find(meme_start)
          end_idx = content.find(meme_end)

          if start_idx == -1 or end_idx == -1:
            print("ERROR: meme markers not found in README.md")
            exit(1)

          start_end = start_idx + len(meme_start)

          import time
          cache_bust = int(time.time())
          # Add cache-busting param if URL doesn't have one yet
          if "?" not in meme_url:
              meme_url = meme_url + "?t=" + str(cache_bust)
          else:
              meme_url = meme_url + "&t=" + str(cache_bust)

          new_meme = f'\n<div align="center">\n  <img src="{meme_url}" width="400" />\n  <br />\n  <sub><i>"{meme_title}"</i></sub>\n</div>\n'

          content = content[:start_end] + new_meme + content[end_idx:]

          # --- Update quote (styled SVG with cache-busting) ---
          quote_start = "<!-- QUOTE_START -->"
          quote_end = "<!-- QUOTE_END -->"

          start_idx = content.find(quote_start)
          end_idx = content.find(quote_end)

          if start_idx == -1 or end_idx == -1:
            print("ERROR: quote markers not found in README.md")
            exit(1)

          start_end = start_idx + len(quote_start)

          quote_url = f"https://quotes-github-readme.vercel.app/api?type=horizontal&theme=radical&cb={cache_bust}"

          new_quote = f'\n<div align="center">\n  <img src="{quote_url}" />\n</div>\n'

          content = content[:start_end] + new_quote + content[end_idx:]

          with open("README.md", "w", encoding="utf-8") as f:
            f.write(content)

          print(f"Meme updated: {meme_title}")
          print(f"Quote updated with cache-busting: cb={cache_bust}")

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily meme and quote"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
